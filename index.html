<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
        body {
            background-color: #f0f2f5; 
            font-family: 'Inter', sans-serif;
            background-image: url(https://media1.tenor.com/m/vVnb3pRdL3UAAAAd/behind-the-yellow-line-taylor-wong.gif);
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 100vh;
        }

        .register-container {
            background-color: white;
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .btn-black {
            background-color: #000;
            color: white;
            width: 100%;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            border: none;
            transition: 0.2s;
        }

        .btn-black:hover { background-color: #333; color: white; }


        .navbar { background: white !important; border-bottom: 1px solid #e5e7eb; }
        .navbar .nav-link { color: #4b5563 !important; font-weight: 500; }
        .navbar .navbar-brand { color: #111827 !important; font-weight: 700; }

        #train { width: 40px; height: 40px; margin-left: 8px; }
    </style>

</head>
<body>

    <nav class="navbar navbar-expand-lg border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="Home Page.html">RailedRails
            <img src="https://thumbs.dreamstime.com/b/fast-train-llogo-design-high-speed-rail-icon-vector-illustration-fast-train-llogo-design-high-speed-rail-silhouette-icon-vector-291958535.jpg" alt="train" id="train">
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="Home Page.html">Home</a>
            <a class="nav-link" href="Schedule Page.html">Schedule</a>
            <a class="nav-link active" href="Login Page.html">Login</a>
            
        </div>
    </div>
</nav>

<div class="container">
    <div class="register-container">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Login</h2>
            <p class="text-muted">Continue to Railed for amazing travel</p>
        </div>
        
        <div class="pfp-wrapper">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png" alt="Profile" class="img-fluid rounded-circle" width="120">
        </div>

        <form id="loginForm">
            <div class="mb-4">
                <label class="form-label fw-semibold">First Name</label>
                <input type="text" class="form-control" id="fname" placeholder="Will" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Email Address</label>
                <input type="email" class="form-control" placeholder="Something@gmail.com" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control" placeholder="********" required>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label small" for="terms">
                    I agree to the Terms and Privacy Policy
                </label>
            </div>

            <button type="submit" class="btn btn-black">Login</button>
        </form>

        <p class="text-center mt-3 small">
            Don't have an account? <a href="Registration Page.html" class="text-primary text-decoration-none fw-bold">Sign Up</a>
        </p>
    </div>
</div>

<script>
    document.getElementById("loginForm").onsubmit = function(event) {
        event.preventDefault(); 
        let name = document.getElementById("fname").value;
        alert("Welcome back, " + name + "! Bringing you to the home page shortly..");
        
        window.location.href = "Home Page.html";
    };
</script>
    
</body>
</html>
