<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The S Y S T E M recovery system</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5; 
            font-family: 'Inter', sans-serif;
            background-image: url(https://media1.tenor.com/m/UW05sKVRbDkAAAAC/minions.gif);
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 100vh;
        }
        .register-container {
            background-color: white;
            max-width: 500px;
            margin: 50px auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        .btn-black {
            background-color: #000;
            color: white;
            width: 100%;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            border: none;
            transition: 0.2s;
        }
        .btn-black:hover { background-color: #333; }
        .back-link { font-size: 0.9rem; margin-top: 20px; display: block; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="register-container">
        <div class="text-center mb-4">
            <h2 class="fw-bold">RECOVERY MODE</h2>
            <p class="text-muted">Enter your registered email and we'll send a Minion with a recovery link.</p>
        </div>

        <form id="recoveryForm">
            <div class="mb-4">
                <label class="form-label fw-semibold">Email Address</label>
                <input type="email" id="recoveryEmail" class="form-control" placeholder="example@villain.com" required>
            </div>

            <button type="submit" class="btn btn-black">Send Recovery Email</button>
        </form>

        <a href="index.html" class="back-link text-decoration-none fw-bold">← Back to the Login Gate</a>
    </div>
</div>

<script>
    document.getElementById("recoveryForm").onsubmit = function(event) {
        event.preventDefault();
        let email = document.getElementById("recoveryEmail").value;
        
        alert("ALERT: A RECOVERY LINK HAS BEEN SENT TO " + email + ". THANK YOU FOR USING THE AMAZING S Y S T E M RECOVERY SERVICE.");
        
        window.location.href = "index.html"; 
    };
</script>

</body>
</html>
